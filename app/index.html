<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Figma Clone</title>
    <link rel="stylesheet" href="/src/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="workspace">
            <div id="layers-panel" class="panel panel-left">
                <div id="pages-section">
                    <div class="section-header" id="pages-header">
                        <span class="section-title">Pages</span>
                        <span class="section-action" id="add-page-btn">+</span>
                    </div>
                    <div id="page-list"></div>
                </div>
                <div id="layers-section">
                    <div class="section-header" id="layers-header">
                        <span class="section-title">Layers</span>
                    </div>
                    <div id="layers-list"></div>
                </div>
            </div>
            <canvas id="canvas"></canvas>
            <div id="properties-panel" class="panel panel-right">
                <div class="panel-header">Properties</div>
                <div id="properties-content"></div>
            </div>
        </div>
        <div id="toolbar">
            <div class="tool-group">
                <button class="tool-btn" data-action="add-frame" title="Frame (F)">Frame</button>
                <button class="tool-btn" data-action="add-rect" title="Rectangle (R)">Rect</button>
                <button class="tool-btn" data-action="add-ellipse" title="Ellipse (O)">Ellipse</button>
                <button class="tool-btn" data-action="add-text" title="Text (T)">Text</button>
                <button class="tool-btn" data-action="add-star" title="Star (S)">Star</button>
                <button class="tool-btn" data-action="add-polygon" title="Polygon">Poly</button>
                <button class="tool-btn" data-action="pen" title="Pen (P)">Pen</button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-action="delete" title="Delete (⌫)">Del</button>
                <button class="tool-btn" data-action="add-image" title="Image">Img</button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn tool-btn-secondary" data-action="export-png">PNG</button>
                <button class="tool-btn tool-btn-secondary" data-action="export-svg">SVG</button>
                <button class="tool-btn tool-btn-secondary" data-action="import-fig">Import</button>
            </div>
            <input type="file" id="image-file-input" accept="image/*" style="display:none" />
            <input type="file" id="fig-file-input" accept=".json,.fig" style="display:none" />
        </div>
        <div id="status-bar">
            <span id="info">Loading...</span>
            <span id="coords"></span>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
